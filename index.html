<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#faf8f3">
<meta name="description" content="AQA Combined Science Trilogy Foundation chemistry revision app. 10 topics, learn mode and test mode, with progress tracking.">
<title>Chemistry revision</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #1a1f2e;
    --ink-soft: #4a5165;
    --ink-muted: #8a90a3;
    --paper: #faf8f3;
    --paper-soft: #f3efe5;
    --paper-line: #e6e1d3;
    --accent: #c2410c;
    --accent-soft: #fed7aa;
    --accent-paper: #fff5eb;
    --green: #15803d;
    --green-soft: #dcfce7;
    --red: #b91c1c;
    --red-soft: #fee2e2;
    --amber: #a16207;
    --amber-soft: #fef3c7;
    --blue: #1d4ed8;
    --blue-soft: #dbeafe;
  }

  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--paper);
    color: var(--ink);
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    padding: 32px 20px 80px;
  }
  .container { max-width: 760px; margin: 0 auto; }
  .serif { font-family: 'Fraunces', Georgia, serif; font-weight: 500; letter-spacing: -0.02em; }

  header {
    display: flex; justify-content: space-between; align-items: flex-end;
    margin-bottom: 36px; padding-bottom: 22px;
    border-bottom: 1px solid var(--paper-line);
  }
  header .brand h1 { font-family: 'Fraunces',Georgia,serif; font-weight: 500; font-size: 26px; letter-spacing: -0.02em; line-height: 1.1; }
  header .brand p { font-size: 12px; color: var(--ink-muted); margin-top: 4px; }
  header .meta { font-size: 11px; color: var(--ink-muted); text-align: right; line-height: 1.4; text-transform: uppercase; letter-spacing: 0.08em; }
  header .meta strong { color: var(--ink); font-weight: 600; }

  .greeting { margin-bottom: 28px; }
  .greeting h2 { font-size: 30px; line-height: 1.15; margin-bottom: 8px; }
  .greeting p { color: var(--ink-soft); font-size: 15px; max-width: 540px; }

  .section-label {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--ink-muted); margin-bottom: 12px; font-weight: 600;
  }

  .stats-row {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px;
    background: var(--paper-line); border: 1px solid var(--paper-line);
    border-radius: 8px; overflow: hidden; margin-bottom: 28px;
  }
  .stat { background: var(--paper); padding: 16px 18px; }
  .stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-muted); margin-bottom: 4px; }
  .stat-value { font-family: 'Fraunces',Georgia,serif; font-size: 26px; font-weight: 500; letter-spacing: -0.02em; line-height: 1; }
  .stat-sub { font-size: 11px; color: var(--ink-soft); margin-top: 3px; }

  .quickstart { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 32px; }
  .qs-btn {
    background: var(--ink); color: var(--paper); border: none;
    border-radius: 8px; padding: 16px 18px; text-align: left;
    cursor: pointer; font-family: 'Inter',sans-serif; transition: transform .15s, background .15s;
  }
  .qs-btn:hover { background: #2a3145; transform: translateY(-1px); }
  .qs-btn.secondary { background: var(--paper); color: var(--ink); border: 1px solid var(--paper-line); }
  .qs-btn.secondary:hover { background: var(--paper-soft); }
  .qs-btn h3 { font-size: 14px; font-weight: 600; margin-bottom: 3px; }
  .qs-btn p { font-size: 12px; opacity: 0.7; line-height: 1.4; }

  .topics-list {
    background: var(--paper); border: 1px solid var(--paper-line);
    border-radius: 8px; overflow: hidden; margin-bottom: 28px;
  }
  .topic-row {
    display: grid; grid-template-columns: 36px 1fr auto auto;
    align-items: center; gap: 14px; padding: 14px 18px;
    border-bottom: 1px solid var(--paper-line); cursor: pointer;
    transition: background .15s;
  }
  .topic-row:last-child { border-bottom: none; }
  .topic-row:hover { background: var(--paper-soft); }
  .topic-code { font-family: 'Fraunces',serif; font-size: 14px; color: var(--accent); font-weight: 500; }
  .topic-name { font-size: 14px; font-weight: 500; }
  .topic-name .sub { display: block; font-size: 11px; color: var(--ink-muted); font-weight: 400; margin-top: 2px; }
  .topic-progress { display: flex; align-items: center; gap: 10px; }
  .progress-bar { width: 70px; height: 5px; background: var(--paper-soft); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); transition: width .3s; }
  .topic-pct { font-size: 11px; color: var(--ink-soft); font-variant-numeric: tabular-nums; min-width: 32px; text-align: right; }
  .topic-arrow { color: var(--ink-muted); font-size: 16px; }

  .recent {
    background: var(--paper); border: 1px solid var(--paper-line);
    border-radius: 8px; padding: 18px;
  }
  .recent-empty { color: var(--ink-muted); font-size: 13px; font-style: italic; text-align: center; padding: 10px 0; }
  .session-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 9px 0; border-bottom: 1px solid var(--paper-line); font-size: 13px;
  }
  .session-row:last-child { border-bottom: none; }
  .session-info { color: var(--ink-soft); }
  .session-info strong { color: var(--ink); font-weight: 500; }
  .session-score { font-family: 'Fraunces',serif; font-size: 15px; font-weight: 500; }

  /* TOPIC OVERVIEW */
  .topic-hero {
    text-align: center; padding: 20px 0 32px;
    border-bottom: 1px solid var(--paper-line); margin-bottom: 32px;
  }
  .topic-hero .code {
    font-family: 'Fraunces',serif; font-size: 14px; color: var(--accent);
    text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px;
  }
  .topic-hero h2 { font-size: 34px; margin-bottom: 8px; max-width: 540px; margin-left: auto; margin-right: auto; }
  .topic-hero p { color: var(--ink-soft); font-size: 15px; max-width: 540px; margin: 0 auto; }

  .topic-choices { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 32px; }
  .choice-card {
    padding: 24px 22px; border-radius: 10px;
    cursor: pointer; transition: transform .15s, box-shadow .15s;
    text-align: left; font-family: 'Inter',sans-serif; border: none;
  }
  .choice-card:hover { transform: translateY(-2px); }
  .choice-card.learn { background: var(--blue-soft); color: var(--blue); border: 1px solid var(--blue); }
  .choice-card.test { background: var(--accent-paper); color: var(--accent); border: 1px solid var(--accent); }
  .choice-icon { font-size: 24px; margin-bottom: 12px; display: block; font-family: 'Fraunces',serif; font-weight: 600; }
  .choice-card h3 { font-size: 17px; font-weight: 600; margin-bottom: 4px; }
  .choice-card p { font-size: 12px; opacity: 0.85; line-height: 1.45; }

  .topic-stats {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px;
    background: var(--paper-line); border: 1px solid var(--paper-line);
    border-radius: 8px; overflow: hidden;
  }

  /* LESSON */
  .lesson-section {
    margin-bottom: 28px;
  }
  .lesson-section h3 {
    font-family: 'Fraunces',serif; font-size: 22px;
    font-weight: 500; letter-spacing: -0.01em;
    margin-bottom: 12px; color: var(--ink);
  }
  .lesson-section p { font-size: 15px; line-height: 1.7; color: var(--ink); margin-bottom: 12px; }
  .lesson-section p:last-child { margin-bottom: 0; }
  .lesson-section ul { margin: 10px 0 14px 22px; }
  .lesson-section li { font-size: 15px; line-height: 1.7; color: var(--ink); margin-bottom: 4px; }

  .callout {
    padding: 14px 18px; border-radius: 6px;
    margin: 18px 0; font-size: 14px; line-height: 1.6;
  }
  .callout-key { background: var(--accent-paper); border-left: 3px solid var(--accent); color: var(--ink); }
  .callout-key strong { color: var(--accent); font-weight: 600; display: block; margin-bottom: 6px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; }
  .callout-warn { background: var(--amber-soft); border-left: 3px solid var(--amber); color: var(--ink); }
  .callout-warn strong { color: var(--amber); font-weight: 600; display: block; margin-bottom: 6px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; }

  .lesson-table {
    width: 100%; border-collapse: collapse; margin: 14px 0;
    font-size: 13px;
  }
  .lesson-table th, .lesson-table td {
    padding: 10px 14px; text-align: left;
    border-bottom: 1px solid var(--paper-line);
  }
  .lesson-table th {
    background: var(--paper-soft); font-weight: 600;
    font-size: 12px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--ink-soft);
  }

  .key-points {
    background: var(--paper); border: 1px solid var(--paper-line);
    border-radius: 8px; padding: 22px 26px; margin-top: 32px;
  }
  .key-points h4 {
    font-family: 'Fraunces',serif; font-size: 18px; margin-bottom: 14px;
  }
  .key-points ul { list-style: none; }
  .key-points li {
    font-size: 14px; line-height: 1.6; padding: 6px 0 6px 24px;
    position: relative;
  }
  .key-points li:before {
    content: '✓'; position: absolute; left: 0; color: var(--green); font-weight: 600;
  }

  .mistakes {
    background: var(--red-soft); border: 1px solid #fca5a5;
    border-radius: 8px; padding: 22px 26px; margin-top: 20px;
  }
  .mistakes h4 {
    font-family: 'Fraunces',serif; font-size: 18px; margin-bottom: 14px; color: var(--red);
  }
  .mistakes ul { list-style: none; }
  .mistakes li {
    font-size: 14px; line-height: 1.6; padding: 6px 0 6px 24px;
    position: relative; color: var(--ink);
  }
  .mistakes li:before {
    content: '✗'; position: absolute; left: 0; color: var(--red); font-weight: 600;
  }

  .lesson-cta {
    margin-top: 36px; padding: 28px; text-align: center;
    background: var(--ink); color: var(--paper); border-radius: 10px;
  }
  .lesson-cta h4 { font-family: 'Fraunces',serif; font-size: 20px; margin-bottom: 6px; color: var(--paper); }
  .lesson-cta p { font-size: 13px; opacity: 0.8; margin-bottom: 14px; }
  .lesson-cta button {
    background: var(--accent); color: white; border: none;
    padding: 12px 24px; border-radius: 6px; font-family: inherit;
    font-size: 14px; font-weight: 500; cursor: pointer;
  }
  .lesson-cta button:hover { background: #9a3412; }

  /* QUIZ */
  .quiz-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 22px; }
  .back-btn {
    background: none; border: none; color: var(--ink-soft);
    font-size: 13px; cursor: pointer; font-family: inherit; padding: 4px 0;
  }
  .back-btn:hover { color: var(--ink); }
  .quiz-progress { font-size: 12px; color: var(--ink-muted); text-transform: uppercase; letter-spacing: 0.08em; }
  .quiz-progress-bar { height: 3px; background: var(--paper-line); border-radius: 2px; margin-bottom: 28px; overflow: hidden; }
  .quiz-progress-fill { height: 100%; background: var(--accent); transition: width .4s; }

  .question-meta { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
  .tag {
    font-size: 11px; padding: 4px 10px; border-radius: 999px;
    font-weight: 500; letter-spacing: 0.02em;
  }
  .tag-topic { background: var(--accent-paper); color: var(--accent); }
  .tag-marks { background: var(--paper-soft); color: var(--ink-soft); }
  .tag-type { background: var(--paper-soft); color: var(--ink-soft); }

  .question-text {
    font-family: 'Fraunces',serif; font-size: 22px; line-height: 1.4;
    font-weight: 500; letter-spacing: -0.01em; margin-bottom: 26px; color: var(--ink);
  }

  .options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 22px; }
  .option {
    display: flex; gap: 14px; padding: 14px 18px;
    border: 1px solid var(--paper-line); border-radius: 8px;
    cursor: pointer; transition: all .15s; background: var(--paper);
    font-family: inherit; text-align: left; width: 100%; align-items: flex-start;
  }
  .option:hover:not(:disabled) { border-color: var(--ink-soft); background: var(--paper-soft); }
  .option:disabled { cursor: default; }
  .option-letter {
    flex-shrink: 0; width: 26px; height: 26px; border-radius: 50%;
    background: var(--paper-soft); display: flex; align-items: center;
    justify-content: center; font-family: 'Fraunces',serif; font-size: 13px; font-weight: 500;
  }
  .option-text { font-size: 14px; line-height: 1.5; flex: 1; padding-top: 3px; }
  .option.correct { background: var(--green-soft); border-color: var(--green); color: var(--green); }
  .option.correct .option-letter { background: var(--green); color: white; }
  .option.wrong { background: var(--red-soft); border-color: var(--red); color: var(--red); }
  .option.wrong .option-letter { background: var(--red); color: white; }

  .written-area textarea {
    width: 100%; min-height: 120px; padding: 14px 16px;
    border: 1px solid var(--paper-line); border-radius: 8px;
    font-family: 'Inter',sans-serif; font-size: 14px; line-height: 1.6;
    background: var(--paper); color: var(--ink); resize: vertical;
  }
  .written-area textarea:focus { outline: none; border-color: var(--ink-soft); }
  .written-area { margin-bottom: 22px; }

  .action-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .btn {
    padding: 12px 20px; border: none; border-radius: 8px;
    font-family: inherit; font-size: 14px; font-weight: 500;
    cursor: pointer; transition: all .15s;
  }
  .btn-primary { background: var(--ink); color: var(--paper); }
  .btn-primary:hover { background: #2a3145; }
  .btn-secondary { background: var(--paper); color: var(--ink); border: 1px solid var(--paper-line); }
  .btn-secondary:hover { background: var(--paper-soft); }
  .btn-accent { background: var(--accent); color: white; }
  .btn-accent:hover { background: #9a3412; }

  /* DETAILED FEEDBACK */
  .feedback-box {
    margin-top: 20px; padding: 20px; border-radius: 8px;
  }
  .feedback-correct { background: var(--green-soft); border-left: 3px solid var(--green); }
  .feedback-wrong { background: var(--red-soft); border-left: 3px solid var(--red); }
  .feedback-label {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em;
    font-weight: 600; margin-bottom: 10px;
  }
  .feedback-correct .feedback-label { color: var(--green); }
  .feedback-wrong .feedback-label { color: var(--red); }
  .feedback-section { margin-bottom: 14px; }
  .feedback-section:last-child { margin-bottom: 0; }
  .feedback-section h5 { font-size: 13px; font-weight: 600; margin-bottom: 4px; color: var(--ink); }
  .feedback-section p { font-size: 13px; line-height: 1.6; color: var(--ink); }

  .mark-scheme {
    margin-top: 20px; padding: 18px; background: var(--accent-paper);
    border-left: 3px solid var(--accent); border-radius: 4px;
  }
  .mark-scheme-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--accent); font-weight: 600; margin-bottom: 8px; }
  .mark-scheme-text { font-size: 14px; line-height: 1.6; color: var(--ink); }

  .self-mark { margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--accent-soft); }
  .self-mark-label { font-size: 13px; color: var(--ink-soft); margin-bottom: 10px; }
  .self-mark-buttons { display: flex; gap: 8px; flex-wrap: wrap; }
  .sm-btn { padding: 8px 14px; border: 1px solid var(--paper-line); background: var(--paper); border-radius: 6px; font-family: inherit; font-size: 13px; cursor: pointer; }
  .sm-btn:hover { background: var(--paper-soft); }
  .sm-btn.full { color: var(--green); border-color: var(--green); }
  .sm-btn.partial { color: var(--amber); border-color: var(--amber); }
  .sm-btn.none { color: var(--red); border-color: var(--red); }

  /* RESULTS */
  .results-hero { text-align: center; padding: 32px 20px; margin-bottom: 28px; }
  .results-big-score { font-family: 'Fraunces',serif; font-size: 68px; font-weight: 500; line-height: 1; letter-spacing: -0.04em; margin-bottom: 8px; }
  .results-total { color: var(--ink-muted); font-size: 15px; margin-bottom: 16px; }
  .results-msg { font-family: 'Fraunces',serif; font-size: 17px; color: var(--ink); max-width: 420px; margin: 0 auto; line-height: 1.4; }

  .review-list .review-item { padding: 14px 0; border-bottom: 1px solid var(--paper-line); }
  .review-item:first-child { padding-top: 0; }
  .review-q { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 5px; }
  .review-mark { flex-shrink: 0; width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; color: white; font-weight: 600; margin-top: 2px; }
  .review-mark.tick { background: var(--green); }
  .review-mark.cross { background: var(--red); }
  .review-mark.partial { background: var(--amber); }
  .review-text { font-size: 14px; line-height: 1.5; }
  .review-detail { font-size: 12px; color: var(--ink-soft); margin-left: 32px; margin-top: 3px; }

  .confirm-card { background: var(--paper); border: 1px solid var(--paper-line); border-radius: 8px; padding: 22px; text-align: center; }
  .confirm-card h3 { font-family: 'Fraunces',serif; font-size: 20px; margin-bottom: 6px; }
  .confirm-card p { color: var(--ink-soft); font-size: 13px; margin-bottom: 18px; }

  @media (max-width: 600px) {
    body { padding: 20px 16px 60px; }
    .stats-row { grid-template-columns: 1fr; }
    .quickstart, .topic-choices { grid-template-columns: 1fr; }
    .topic-row { grid-template-columns: 32px 1fr; gap: 10px; row-gap: 4px; }
    .topic-progress { grid-column: 2; }
    .topic-arrow { display: none; }
    header { flex-direction: column; align-items: flex-start; gap: 8px; }
    header .meta { text-align: left; }
    .question-text { font-size: 19px; }
    .results-big-score { font-size: 52px; }
    .topic-hero h2 { font-size: 26px; }
  }

  .fade-in { animation: fadeIn .3s ease-out; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<div class="container"><div id="app"></div></div>
<input type="file" id="import-file-input" accept="application/json,.json" style="display:none">

<script>
(function() {
  'use strict';

  // =============================================
  // TOPICS METADATA
  // =============================================
  const TOPICS = [
    { id: 'c1', code: 'C1', name: 'Atomic structure & periodic table', sub: 'Atoms, elements, electron shells, groups' },
    { id: 'c2', code: 'C2', name: 'Bonding & properties of matter', sub: 'Ionic, covalent and metallic bonding' },
    { id: 'c3', code: 'C3', name: 'Quantitative chemistry', sub: 'Relative formula mass, balancing equations' },
    { id: 'c4', code: 'C4', name: 'Chemical changes', sub: 'Acids, alkalis, reactivity, electrolysis' },
    { id: 'c5', code: 'C5', name: 'Energy changes', sub: 'Exothermic and endothermic reactions' },
    { id: 'c6', code: 'C6', name: 'Rate of reaction', sub: 'Speed of reactions, catalysts' },
    { id: 'c7', code: 'C7', name: 'Organic chemistry', sub: 'Crude oil, hydrocarbons, combustion' },
    { id: 'c8', code: 'C8', name: 'Chemical analysis', sub: 'Pure substances, chromatography' },
    { id: 'c9', code: 'C9', name: 'Chemistry of the atmosphere', sub: 'Greenhouse gases, climate change' },
    { id: 'c10', code: 'C10', name: 'Using resources', sub: 'Water, recycling, sustainability' }
  ];

  // =============================================
  // LESSONS (REVISION CONTENT)
  // Each lesson maps to a topic. Sections are
  // rendered in order. HTML-light: simple tags only.
  // =============================================
  const LESSONS = {
    c1: {
      intro: "Everything around you is made of atoms. They're so small you can't see them, even with a normal microscope. But once you understand how they're built, the rest of chemistry starts to fall into place. This topic covers what atoms are made of, how they're arranged on the periodic table, and why elements in the same group behave alike.",
      sections: [
        { h: "What is an atom?",
          body: ["An atom is the smallest part of an element. Atoms are tiny: about 0.1 nanometres across (that's 0.0000001 mm). Despite being so small, they have an even smaller part in the middle called the <strong>nucleus</strong>. Around the nucleus, in regions called <strong>shells</strong> (or energy levels), are <strong>electrons</strong>.",
                 "Most of the atom is actually empty space. The nucleus is about 10,000 times smaller than the whole atom, but it contains almost all the mass."] },
        { h: "The three subatomic particles",
          body: ["Atoms are made of three smaller particles. Learn this table - examiners love testing it."],
          table: [["Particle","Where it is","Relative charge","Relative mass"],
                  ["Proton","Nucleus","+1","1"],
                  ["Neutron","Nucleus","0","1"],
                  ["Electron","Shells around nucleus","-1","Very small (about 1/2000)"]],
          afterBody: ["An atom has <strong>no overall charge</strong> because the number of protons equals the number of electrons. The +1 charges cancel the -1 charges exactly."] },
        { h: "Atomic number and mass number",
          body: ["Look at any element on the periodic table and you'll see two numbers next to its symbol:",
                 "<strong>Atomic number</strong> (the smaller one) = number of protons. This is what defines an element. All carbon atoms have 6 protons. Always.",
                 "<strong>Mass number</strong> (the bigger one) = number of protons + number of neutrons.",
                 "To find the number of neutrons: <strong>mass number minus atomic number</strong>.",
                 "Example: Sodium (Na) has atomic number 11 and mass number 23. So it has 11 protons, 11 electrons, and 23 minus 11 = 12 neutrons."] },
        { h: "Isotopes",
          body: ["Most elements come in different versions called <strong>isotopes</strong>. Isotopes have the SAME number of protons but DIFFERENT numbers of neutrons.",
                 "Example: Carbon-12 has 6 protons and 6 neutrons. Carbon-14 has 6 protons and 8 neutrons. Both are carbon (same number of protons) but they have different mass numbers."],

    c2: {

                 "<ul><li><strong>Ionic bonding:</strong> One atom gives electrons to another (metal + non-metal)</li><li><strong>Covalent bonding:</strong> Atoms share electrons (non-metal + non-metal)</li><li><strong>Metallic bonding:</strong> Metal atoms share their outer electrons in a 'sea' (metal + metal)</li></ul>"] },
        { h: "Ionic bonding",
          body: ["Ionic bonds form between a <strong>metal</strong> and a <strong>non-metal</strong>.",
                 "The metal atom <strong>loses</strong> its outer electrons (becoming a positive ion). The non-metal atom <strong>gains</strong> those electrons (becoming a negative ion).",
                 "The positive and negative ions are then attracted to each other. This electrostatic attraction is the ionic bond.",
                 "Example: Sodium chloride (NaCl). Sodium loses 1 electron to become Na+. Chlorine gains 1 electron to become Cl-. The Na+ and Cl- ions attract each other."] },
        { h: "Properties of ionic compounds",

                 "<strong>High melting and boiling points.</strong> There are strong electrostatic forces between the ions in the lattice. Lots of energy is needed to break these forces, so the melting point is high.",
                 "<strong>Conduct electricity when molten or dissolved, but not when solid.</strong> Electricity needs charged particles that can move. In a solid lattice, the ions are fixed in place. When melted or dissolved, the ions can move freely and carry charge.",

        { h: "Covalent bonding",

        { h: "Simple molecular substances",
          body: ["Small molecules like water, oxygen and methane have:",

                 "When you melt or boil a simple molecular substance, you only need to overcome the WEAK forces between molecules. The covalent bonds inside the molecules don't break.",
                 "This is why simple molecular substances have <strong>low melting and boiling points</strong>. They don't conduct electricity because there are no charged particles."],
          callout: { type: 'warn', label: "Don't get caught out", text: "The covalent bonds inside a molecule are STRONG. The forces BETWEEN molecules are weak. Many students lose marks by saying 'weak covalent bonds'. Get the language right." } },
        { h: "Giant covalent (diamond, graphite, silicon dioxide)",

                 "<strong>Graphite:</strong> Each carbon forms 3 covalent bonds to other carbons in flat layers. The 4th outer electron is <strong>delocalised</strong> (free to move). This means graphite CAN conduct electricity. The layers slide over each other easily so graphite feels slippery (used in pencils).",
                 "<strong>Silicon dioxide (sand):</strong> Giant covalent structure, very high melting point, doesn't conduct."] },
        { h: "Metallic bonding",
          body: ["In metals, the atoms are arranged in a regular pattern. The outer electrons <strong>aren't held by any one atom</strong> - they're free to move around. We call this a 'sea of delocalised electrons'.",

      ],
      keyPoints: [

        "Ionic compounds have high melting points (strong lattice forces)",

        "Simple molecules: weak forces BETWEEN molecules, low melting points",
        "Diamond: 4 bonds per carbon, hard, doesn't conduct",

      mistakes: [

    c3: {
      intro: "Quantitative chemistry is the maths side of chemistry. You need to calculate masses, balance equations, and understand that nothing is created or destroyed in a chemical reaction.",
      sections: [
        { h: "Relative formula mass (Mr)",
          body: ["The relative formula mass of a compound is the sum of the relative atomic masses of all the atoms in its formula.",
                 "<strong>How to calculate:</strong>",
                 "<ul><li>Look up the relative atomic mass (Ar) of each element on the periodic table</li><li>Multiply each by how many atoms there are</li><li>Add them all up</li></ul>",
                 "<strong>Example 1: CO2</strong>. C = 12, O = 16. So Mr = 12 + (2 × 16) = 12 + 32 = 44.",
                 "<strong>Example 2: H2O</strong>. H = 1, O = 16. So Mr = (2 × 1) + 16 = 18.",
                 "<strong>Example 3: Ca(NO3)2</strong>. Watch the brackets - everything inside is multiplied by 2. Ca = 40, N = 14, O = 16. So Mr = 40 + 2 × (14 + 3×16) = 40 + 2 × 62 = 40 + 124 = 164."] },
        { h: "Conservation of mass",
          body: ["In any chemical reaction, <strong>the total mass of the products equals the total mass of the reactants</strong>. Atoms don't appear or disappear, they just rearrange.",
                 "This is why balanced equations have the same number of each type of atom on both sides.",
                 "<strong>Apparent mass changes in open containers</strong> can confuse students. If a gas is given off (like CO2 from a fizzing reaction), the mass of what's left appears to decrease. But the mass hasn't actually been lost - the gas escaped. If you trapped the gas, the total mass would still be the same."] },
        { h: "Balancing equations",
          body: ["A balanced equation has the same number of each type of atom on both sides.",
                 "<strong>How to balance:</strong>",
                 "<ul><li>Count each type of atom on both sides</li><li>If they don't match, put numbers in front of formulas to balance them</li><li>NEVER change a formula (e.g. you can't change H2O to H3O to balance)</li></ul>",
                 "<strong>Example:</strong> Mg + O2 → MgO",
                 "Left side: 1 Mg, 2 O. Right side: 1 Mg, 1 O. Oxygen isn't balanced.",
                 "Put 2 in front of MgO: Mg + O2 → 2MgO. Now: Left: 1 Mg, 2 O. Right: 2 Mg, 2 O. Magnesium isn't balanced.",
                 "Put 2 in front of Mg: <strong>2Mg + O2 → 2MgO</strong>. Now both sides have 2 Mg and 2 O. Balanced."] }
      ],
      keyPoints: [
        "Mr = sum of atomic masses of all atoms in the formula",
        "Brackets in formulas multiply everything inside",
        "Mass is conserved in every chemical reaction",
        "Balancing equations: change numbers in front of formulas, never the formulas themselves",
        "Both sides of a balanced equation must have equal numbers of each atom type"
      ],
      mistakes: [
        "Forgetting to multiply through brackets when calculating Mr",
        "Changing a formula (like H2O to H3O) to balance instead of using numbers in front",
        "Confusing atomic number with relative atomic mass",
        "Thinking mass is lost when a gas escapes - the mass left the container, it wasn't destroyed"
      ]
    },

    c5: {

      sections: [

  // =============================================
  // STATE
  // =============================================
  let state = {
    view: 'home',
    progress: { topics: {}, sessions: [], lessonsRead: {} },
    session: null,
    currentTopicId: null
  };

  // =============================================
  // STORAGE
  // =============================================
  const STORAGE_KEY = 'chem_progress_v2';

  function loadProgress() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      const loaded = JSON.parse(raw);
      state.progress = {
        topics: loaded.topics || {},
        sessions: loaded.sessions || [],
        lessonsRead: loaded.lessonsRead || {}
      };
    } catch (e) {
      console.log('No saved progress found, starting fresh');
    }
  }
  function saveProgress() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state.progress));
    } catch (e) {
      console.error('Could not save progress', e);
    }
  }
  function resetProgress() {
    state.progress = { topics: {}, sessions: [], lessonsRead: {} };
    try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
    state.view = 'home';
    render();
  }

  function exportProgress() {
    try {
      const data = JSON.stringify(state.progress, null, 2);
      const blob = new Blob([data], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const stamp = new Date().toISOString().slice(0, 10);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'chemistry-progress-' + stamp + '.json';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(function() { URL.revokeObjectURL(url); }, 0);
    } catch (e) {
      alert('Could not export progress. ' + (e && e.message ? e.message : ''));
    }
  }
  function triggerImport() {
    const input = document.getElementById('import-file-input');
    input.value = '';
    input.click();
  }
  function handleImportFile(event) {
    const file = event.target.files && event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
      try {
        const loaded = JSON.parse(e.target.result);
        if (!loaded || typeof loaded !== 'object') throw new Error('not an object');
        const hasData = (state.progress.sessions && state.progress.sessions.length > 0)
          || Object.keys(state.progress.topics || {}).length > 0
          || Object.keys(state.progress.lessonsRead || {}).length > 0;
        if (hasData && !confirm('This will replace your current progress on this browser. Carry on?')) {
          event.target.value = '';
          return;
        }
        state.progress = {
          topics: loaded.topics || {},
          sessions: loaded.sessions || [],
          lessonsRead: loaded.lessonsRead || {}
        };
        saveProgress();
        event.target.value = '';
        alert('Progress imported.');
        render();
      } catch (err) {
        alert("That doesn't look like a valid progress file.");
        event.target.value = '';
      }
    };
    reader.readAsText(file);
  }

  // =============================================
  // STATS HELPERS
  // =============================================
  function getTopicStats(topicId) {
    const t = state.progress.topics[topicId];
    if (!t || !t.maxMarks) return { attempted: 0, marksEarned: 0, maxMarks: 0, pct: 0, lessonRead: !!state.progress.lessonsRead[topicId] };
    return {
      attempted: t.attempted || 0,
      marksEarned: t.marksEarned || 0,
      maxMarks: t.maxMarks || 0,
      pct: Math.round((t.marksEarned / t.maxMarks) * 100),
      lessonRead: !!state.progress.lessonsRead[topicId]
    };
  }
  function recordAnswer(question, marksEarned) {
    const t = state.progress.topics[question.topic] || { attempted: 0, marksEarned: 0, maxMarks: 0 };
    t.attempted = (t.attempted || 0) + 1;
    t.marksEarned = (t.marksEarned || 0) + marksEarned;
    t.maxMarks = (t.maxMarks || 0) + question.marks;
    state.progress.topics[question.topic] = t;
  }
  function recordSession(data) {
    if (!state.progress.sessions) state.progress.sessions = [];
    state.progress.sessions.unshift(data);
    state.progress.sessions = state.progress.sessions.slice(0, 20);
  }
  function markLessonRead(topicId) {
    state.progress.lessonsRead[topicId] = Date.now();
    saveProgress();
  }
  function getTotalStats() {
    let attempted = 0, marksEarned = 0, maxMarks = 0;
    Object.values(state.progress.topics).forEach(t => {
      attempted += t.attempted || 0;
      marksEarned += t.marksEarned || 0;
      maxMarks += t.maxMarks || 0;
    });
    return { attempted, marksEarned, maxMarks,
      pct: maxMarks ? Math.round((marksEarned / maxMarks) * 100) : 0 };
  }
  function getWeakestTopic() {
    let weakest = null, worstPct = 101;
    TOPICS.forEach(topic => {
      const stats = getTopicStats(topic.id);
      if (stats.attempted >= 2 && stats.pct < worstPct) {
        worstPct = stats.pct; weakest = topic;
      }
    });
    return weakest;
  }
  function getRecommendedTopic() {
    // First topic that hasn't been read, OR weakest, OR first
    const unread = TOPICS.find(t => !state.progress.lessonsRead[t.id]);
    if (unread) return unread;
    return getWeakestTopic() || TOPICS[0];
  }

  // =============================================
  // SESSION
  // =============================================
  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }
  function startSession(mode, topicId) {
    let questions = [], label = '';
    if (mode === 'mixed') {
      questions = shuffle(QUESTIONS).slice(0, 8);
      label = 'Mixed practice';
    } else if (mode === 'weakest') {
      const weak = getWeakestTopic();
      if (weak) {
        questions = shuffle(QUESTIONS.filter(q => q.topic === weak.id));
        label = TOPICS.find(t => t.id === weak.id).name + ' (your weak spot)';
      } else {
        questions = shuffle(QUESTIONS).slice(0, 6);
        label = 'Mixed practice';
      }
    } else if (mode === 'topic') {
      questions = shuffle(QUESTIONS.filter(q => q.topic === topicId));
      label = TOPICS.find(t => t.id === topicId).name;
    }
    state.session = { questions, label, mode, currentIdx: 0, answers: [], startTime: Date.now() };
    state.view = 'quiz';
    render();
  }
  function finishSession() {
    const s = state.session;
    let earned = 0, total = 0;
    s.answers.forEach(a => { earned += a.marksEarned; total += a.maxMarks; });
    recordSession({ date: Date.now(), label: s.label, mode: s.mode,
      questionsAnswered: s.answers.length, marksEarned: earned, maxMarks: total });
    saveProgress();
    state.view = 'results';
    render();
  }

  // =============================================
  // RENDER HELPERS
  // =============================================
  function escapeHtml(text) {
    return String(text)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#039;');
  }
  // Allow safe HTML in lesson body - we control content fully so trust it
  function lessonBody(arr) {
    return arr.map(p => '<p>' + p + '</p>').join('');
  }
  function lessonTable(rows) {
    if (!rows || !rows.length) return '';
    let html = '<table class="lesson-table"><thead><tr>';
    rows[0].forEach(c => { html += '<th>' + escapeHtml(c) + '</th>'; });
    html += '</tr></thead><tbody>';
    rows.slice(1).forEach(r => {
      html += '<tr>';
      r.forEach(c => { html += '<td>' + escapeHtml(c) + '</td>'; });
      html += '</tr>';
    });
    return html + '</tbody></table>';
  }

  // =============================================
  // VIEWS
  // =============================================
  function viewHome() {
    const total = getTotalStats();
    const recommended = getRecommendedTopic();
    const weak = getWeakestTopic();
    const totalQuestions = QUESTIONS.length;
    const lessonsReadCount = Object.keys(state.progress.lessonsRead).length;

    const greeting = total.attempted === 0 && lessonsReadCount === 0
      ? { h: "Right, let's get started.", p: "This is your AQA Combined Science Foundation chemistry revision app. For each topic you can read a lesson first, then test yourself. Your progress saves automatically across sessions." }
      : total.pct >= 75 ? { h: "Strong work so far.", p: "You're running at " + total.pct + "% across the topics you've tested. Keep going, or pick up a new topic." }
      : total.pct >= 50 ? { h: "Welcome back.", p: "You're at " + total.pct + "% overall. Solid progress. " + (lessonsReadCount + ' of 10 lessons read.') }
      : { h: "Welcome back.", p: "You're at " + total.pct + "% overall. Early days. Read a lesson before testing yourself to boost the score." };

    const statsHtml = '<div class="stats-row">' +
      '<div class="stat"><div class="stat-label">Lessons read</div><div class="stat-value">' + lessonsReadCount + '<span style="color: var(--ink-muted); font-size: 16px;">/' + TOPICS.length + '</span></div><div class="stat-sub">of 10 topics</div></div>' +
      '<div class="stat"><div class="stat-label">Marks scored</div><div class="stat-value">' + total.marksEarned + '<span style="color: var(--ink-muted); font-size: 16px;">/' + total.maxMarks + '</span></div><div class="stat-sub">' + total.pct + '% overall</div></div>' +
      '<div class="stat"><div class="stat-label">Sessions</div><div class="stat-value">' + (state.progress.sessions ? state.progress.sessions.length : 0) + '</div><div class="stat-sub">logged</div></div>' +
    '</div>';

    const weakBtnDisabled = weak ? '' : 'disabled style="opacity: 0.5; cursor: not-allowed;"';
    const weakLabel = weak ? weak.name : 'Do a few more tests first';

    const quickstartHtml = '<div class="quickstart">' +
      '<button class="qs-btn" onclick="window._app.openTopic(\'' + recommended.id + '\')">' +
        '<h3>' + (lessonsReadCount === 0 ? 'Start: ' : 'Continue: ') + escapeHtml(recommended.code) + '</h3><p>' + escapeHtml(recommended.name) + '</p>' +
      '</button>' +
      '<button class="qs-btn secondary" ' + weakBtnDisabled + ' onclick="window._app.start(\'weakest\')">' +

      '</button>' +
    '</div>';

    let topicsHtml = '<div class="section-label">Topics</div><div class="topics-list">';

      const stats = getTopicStats(topic.id);
      const fillWidth = stats.maxMarks > 0 ? stats.pct : 0;
      const readIcon = stats.lessonRead ? '<span style="color: var(--green); font-size: 11px; margin-right: 8px;">✓ read</span>' : '';

        '<div class="topic-code">' + escapeHtml(topic.code) + '</div>' +
        '<div class="topic-name">' + escapeHtml(topic.name) + '<span class="sub">' + escapeHtml(topic.sub) + '</span></div>' +
        '<div class="topic-progress">' + readIcon +
          '<div class="progress-bar"><div class="progress-fill" style="width: ' + fillWidth + '%;"></div></div>' +
          '<div class="topic-pct">' + (stats.attempted > 0 ? stats.pct + '%' : '—') + '</div>' +
        '</div>' +
        '<div class="topic-arrow">›</div>' +
      '</div>';
    });
    topicsHtml += '</div>';

    let recentHtml = '<div class="section-label">Recent sessions</div><div class="recent">';

    } else {
      state.progress.sessions.slice(0, 5).forEach(s => {
        const pct = s.maxMarks ? Math.round((s.marksEarned / s.maxMarks) * 100) : 0;

        const dateStr = date.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' }) + ' at ' + date.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });

    let footerHtml = '<div style="text-align: center; margin-top: 32px; display: flex; gap: 18px; justify-content: center; flex-wrap: wrap;">';

      footerHtml += '<button class="back-btn" onclick="window._app.exportProgress()" style="color: var(--ink-muted); font-size: 12px;">Export progress</button>';

    statsHtml + quickstartHtml + topicsHtml + recentHtml + resetHtml;
  }

    '<div class="topic-stats">' +
      '<div class="stat"><div class="stat-label">Lesson</div><div class="stat-value" style="font-size: 18px;">' + (stats.lessonRead ? '✓' : '—') + '</div><div class="stat-sub">' + (stats.lessonRead ? 'Read' : 'Not read yet') + '</div></div>' +
      '<div class="stat"><div class="stat-label">Questions done</div><div class="stat-value" style="font-size: 22px;">' + stats.attempted + '</div><div class="stat-sub">' + (stats.attempted > 0 ? 'across all attempts' : 'so far') + '</div></div>' +
      '<div class="stat"><div class="stat-label">Score</div><div class="stat-value" style="font-size: 22px;">' + (stats.attempted > 0 ? stats.pct + '%' : '—') + '</div><div class="stat-sub">' + stats.marksEarned + '/' + stats.maxMarks + ' marks</div></div>' +
    '</div>';
  }

  function viewLesson() {
    const topic = TOPICS.find(t => t.id === state.currentTopicId);
    const lesson = LESSONS[topic.id];

    let html = '<div class="quiz-header">' +
      '<button class="back-btn" onclick="window._app.openTopic(\'' + topic.id + '\')">← Back to topic</button>' +
      '<div class="quiz-progress">' + escapeHtml(topic.code) + ' · Lesson</div>' +
    '</div>' +
    '<div class="topic-hero fade-in" style="padding-bottom: 18px; margin-bottom: 24px;">' +
      '<div class="code">' + escapeHtml(topic.code) + ' · Lesson</div>' +
      '<h2 class="serif">' + escapeHtml(topic.name) + '</h2>' +
      '<p>' + escapeHtml(lesson.intro) + '</p>' +
    '</div>';

    lesson.sections.forEach(s => {
      html += '<div class="lesson-section">' +
        '<h3>' + escapeHtml(s.h) + '</h3>' +
        lessonBody(s.body || []) +
        (s.table ? lessonTable(s.table) : '') +
        (s.afterBody ? lessonBody(s.afterBody) : '') +
        (s.callout ? '<div class="callout callout-' + s.callout.type + '"><strong>' + escapeHtml(s.callout.label) + '</strong>' + escapeHtml(s.callout.text) + '</div>' : '') +
      '</div>';
    });

    html += '<div class="key-points"><h4>Key points to remember</h4><ul>';
    lesson.keyPoints.forEach(p => { html += '<li>' + escapeHtml(p) + '</li>'; });
    html += '</ul></div>';

    html += '<div class="mistakes"><h4>Common mistakes to avoid</h4><ul>';
    lesson.mistakes.forEach(p => { html += '<li>' + escapeHtml(p) + '</li>'; });
    html += '</ul></div>';

    html += '<div class="lesson-cta">' +
      '<h4>Ready to test yourself?</h4>' +
      '<p>See how much of this sticks before moving on.</p>' +
      '<button onclick="window._app.markReadAndTest(\'' + topic.id + '\')">Test me on ' + escapeHtml(topic.code) + ' →</button>' +
    '</div>';

    return html;
  }

  function viewQuiz() {
    const s = state.session;
    const q = s.questions[s.currentIdx];
    const topic = TOPICS.find(t => t.id === q.topic);
    const progressPct = ((s.currentIdx + 1) / s.questions.length) * 100;
    const answered = s.answers[s.currentIdx];

    let optionsHtml = '';
    if (q.type === 'mcq') {
      q.options.forEach((opt, i) => {
        let cls = 'option', disabled = '';
        if (answered) {
          disabled = 'disabled';
          if (i === q.answer) cls += ' correct';
          else if (i === answered.picked) cls += ' wrong';
        }
        const letter = String.fromCharCode(65 + i);
        optionsHtml += '<button class="' + cls + '" ' + disabled + ' onclick="window._app.answerMcq(' + i + ')">' +
          '<span class="option-letter">' + letter + '</span>' +
          '<span class="option-text">' + escapeHtml(opt) + '</span>' +
        '</button>';
      });
      optionsHtml = '<div class="options">' + optionsHtml + '</div>';
    } else {
      const val = answered && answered.text ? escapeHtml(answered.text) : '';
      const readonly = answered ? 'readonly' : '';
      optionsHtml = '<div class="written-area">' +
        '<textarea id="written-answer" placeholder="Type your answer here..." ' + readonly + '>' + val + '</textarea>' +
      '</div>';
      if (!answered) {
        optionsHtml += '<div class="action-row"><button class="btn btn-primary" onclick="window._app.submitWritten()">Submit answer</button></div>';
      }
    }

    let feedbackHtml = '';
    if (answered) {
      if (q.type === 'mcq') {
        const correct = answered.picked === q.answer;
        feedbackHtml = '<div class="feedback-box ' + (correct ? 'feedback-correct' : 'feedback-wrong') + ' fade-in">' +
          '<div class="feedback-label">' + (correct ? 'Correct' : 'Not quite') + '</div>';
        if (!correct) {
          feedbackHtml += '<div class="feedback-section">' +
            '<h5>Why your answer is wrong</h5>' +
            '<p>' + escapeHtml(q.optionFeedback[answered.picked]) + '</p>' +
          '</div>' +
          '<div class="feedback-section">' +
            '<h5>The correct answer</h5>' +
            '<p>' + escapeHtml(q.optionFeedback[q.answer]) + '</p>' +
          '</div>';
        } else {
          feedbackHtml += '<div class="feedback-section">' +
            '<p>' + escapeHtml(q.optionFeedback[answered.picked]) + '</p>' +
          '</div>';
        }
        feedbackHtml += '<div class="feedback-section">' +
          '<h5>Remember</h5>' +
          '<p>' + escapeHtml(q.teach) + '</p>' +
        '</div>' +
        '</div>';
      } else {
        // Written - show mark scheme
        feedbackHtml = '<div class="mark-scheme fade-in">' +
          '<div class="mark-scheme-label">Mark scheme · ' + q.marks + ' mark' + (q.marks > 1 ? 's' : '') + '</div>' +
          '<div class="mark-scheme-text">' + escapeHtml(q.markScheme) + '</div>';
        if (answered.marksEarned === undefined) {
          const smButtons = q.marks === 1
            ? '<button class="sm-btn full" onclick="window._app.selfMark(1)">Got it right (1 mark)</button>' +
              '<button class="sm-btn none" onclick="window._app.selfMark(0)">Got it wrong (0 marks)</button>'
            : '<button class="sm-btn full" onclick="window._app.selfMark(' + q.marks + ')">Full marks (' + q.marks + '/' + q.marks + ')</button>' +
              '<button class="sm-btn partial" onclick="window._app.selfMark(' + Math.ceil(q.marks/2) + ')">Some marks (' + Math.ceil(q.marks/2) + '/' + q.marks + ')</button>' +
              '<button class="sm-btn none" onclick="window._app.selfMark(0)">No marks (0/' + q.marks + ')</button>';
          feedbackHtml += '<div class="self-mark">' +
            '<div class="self-mark-label">How did you do? Be honest with yourself - compare your answer to the mark scheme.</div>' +
            '<div class="self-mark-buttons">' + smButtons + '</div>' +
          '</div>';
        } else {
          feedbackHtml += '<div class="self-mark"><div class="self-mark-label">You scored: <strong>' + answered.marksEarned + '/' + q.marks + '</strong></div></div>';
        }
        feedbackHtml += '</div>';
        feedbackHtml += '<div class="feedback-box feedback-correct fade-in" style="background: var(--paper-soft); border-left-color: var(--ink-muted);"><div class="feedback-label" style="color: var(--ink-muted);">Remember</div><div class="feedback-section"><p>' + escapeHtml(q.teach) + '</p></div></div>';
      }
    }

    let nextBtnHtml = '';
    if (answered && (q.type === 'mcq' || answered.marksEarned !== undefined)) {
      const isLast = s.currentIdx === s.questions.length - 1;
      const label = isLast ? 'See results' : 'Next question';
      nextBtnHtml = '<div style="margin-top: 20px;"><button class="btn btn-accent" onclick="window._app.nextQuestion()">' + label + ' →</button></div>';
    }

    return '<div class="quiz-header">' +
      '<button class="back-btn" onclick="window._app.back()">← Back to home</button>' +
      '<div class="quiz-progress">Q' + (s.currentIdx + 1) + ' / ' + s.questions.length + '</div>' +
    '</div>' +
    '<div class="quiz-progress-bar"><div class="quiz-progress-fill" style="width: ' + progressPct + '%;"></div></div>' +
    '<div class="question-meta">' +
      '<span class="tag tag-topic">' + topic.code + ' · ' + escapeHtml(topic.name) + '</span>' +
      '<span class="tag tag-marks">' + q.marks + ' mark' + (q.marks > 1 ? 's' : '') + '</span>' +
      '<span class="tag tag-type">' + (q.type === 'mcq' ? 'Multiple choice' : 'Written') + '</span>' +
    '</div>' +
    '<div class="question-text">' + escapeHtml(q.text) + '</div>' +
    optionsHtml + feedbackHtml + nextBtnHtml;
  }

  function viewResults() {
    const s = state.session;
    let earned = 0, total = 0;
    s.answers.forEach(a => { earned += a.marksEarned; total += a.maxMarks; });
    const pct = total ? Math.round((earned / total) * 100) : 0;

    let msg;
    if (pct >= 90) msg = "Outstanding. You've got this topic nailed.";
    else if (pct >= 75) msg = "Strong work. A few small things to polish.";
    else if (pct >= 60) msg = "Solid effort. Look back at the lesson for the bits you missed.";
    else if (pct >= 40) msg = "Worth re-reading the lesson before trying again. The gap between your answers and the mark scheme is where the learning is.";
    else msg = "Tough one. Go back to the lesson - the answers are all explained in there. Then try again.";

    let reviewHtml = '<div class="section-label">Review</div><div class="review-list">';
    s.answers.forEach((a, idx) => {
      const q = s.questions[idx];
      let markCls, markChar;
      if (a.marksEarned === a.maxMarks) { markCls = 'tick'; markChar = '✓'; }
      else if (a.marksEarned > 0) { markCls = 'partial'; markChar = '~'; }
      else { markCls = 'cross'; markChar = '✗'; }
      reviewHtml += '<div class="review-item">' +
        '<div class="review-q">' +
          '<span class="review-mark ' + markCls + '">' + markChar + '</span>' +
          '<span class="review-text">' + escapeHtml(q.text) + '</span>' +
        '</div>' +
        '<div class="review-detail">' + a.marksEarned + '/' + a.maxMarks + ' marks · ' + escapeHtml(q.teach) + '</div>' +
      '</div>';
    });
    reviewHtml += '</div>';

    return '<div class="quiz-header">' +
      '<button class="back-btn" onclick="window._app.back()">← Back to home</button>' +
      '<div class="quiz-progress">' + escapeHtml(s.label) + '</div>' +
    '</div>' +
    '<div class="results-hero fade-in">' +
      '<div class="results-big-score">' + earned + '<span style="color: var(--ink-muted);">/' + total + '</span></div>' +
      '<div class="results-total">' + pct + '% · ' + s.answers.length + ' questions</div>' +
      '<div class="results-msg">' + msg + '</div>' +
    '</div>' +
    '<div style="display: flex; gap: 10px; justify-content: center; margin-bottom: 32px;">' +
      '<button class="btn btn-secondary" onclick="window._app.back()">Back to home</button>' +
      '<button class="btn btn-accent" onclick="window._app.again()">Try another session →</button>' +
    '</div>' + reviewHtml;
  }

  // =============================================
  // ACTIONS
  // =============================================
  window._app = {
    start: function(mode, topicId) { startSession(mode, topicId); },
    openTopic: function(topicId) { state.currentTopicId = topicId; state.view = 'topic'; render(); },
    openLesson: function(topicId) { state.currentTopicId = topicId; state.view = 'lesson'; render(); },
    markReadAndTest: function(topicId) { markLessonRead(topicId); startSession('topic', topicId); },
    back: function() { state.view = 'home'; state.session = null; state.currentTopicId = null; render(); },
    answerMcq: function(picked) {
      const s = state.session; const q = s.questions[s.currentIdx];
      const correct = picked === q.answer;
      const marksEarned = correct ? q.marks : 0;
      s.answers[s.currentIdx] = { picked, marksEarned, maxMarks: q.marks };
      recordAnswer(q, marksEarned);
      saveProgress();
      // Mark lesson as "encountered" so we record the journey
      if (!state.progress.lessonsRead[q.topic]) state.progress.lessonsRead[q.topic] = state.progress.lessonsRead[q.topic] || Date.now();
      render();
    },
    submitWritten: function() {
      const s = state.session; const q = s.questions[s.currentIdx];
      const txt = document.getElementById('written-answer').value.trim();
      if (!txt) { alert("Have a go first, even if you're not sure."); return; }
      s.answers[s.currentIdx] = { text: txt, maxMarks: q.marks };
      render();
    },
    selfMark: function(marks) {
      const s = state.session; const q = s.questions[s.currentIdx];
      s.answers[s.currentIdx].marksEarned = marks;
      recordAnswer(q, marks);
      saveProgress();
      render();
    },
    nextQuestion: function() {
      const s = state.session;
      if (s.currentIdx === s.questions.length - 1) finishSession();
      else { s.currentIdx++; render(); }
    },
    again: function() { startSession('mixed'); },
    confirmReset: function() { state.view = 'confirm-reset'; render(); },
    doReset: function() { resetProgress(); },
    exportProgress: function() { exportProgress(); },
    importProgress: function() { triggerImport(); }
  };

  function render() {
    const app = document.getElementById('app');
    let html;
    if (state.view === 'home') html = viewHome();
    else if (state.view === 'topic') html = viewTopicPage();
    else if (state.view === 'lesson') html = viewLesson();
    else if (state.view === 'quiz') html = viewQuiz();
    else if (state.view === 'results') html = viewResults();
    else if (state.view === 'confirm-reset') html = viewConfirmReset();
    else html = viewHome();
    app.innerHTML = html;
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function init() {
    loadProgress();
    const importInput = document.getElementById('import-file-input');
    if (importInput) importInput.addEventListener('change', handleImportFile);
    render();
  }
  init();
})();
</script>
</body>
</html>
